services:
  vane:
    image: itzcrazykns1337/vane:latest
    build:
      context: .
    ports:
      - '3006:3000'
    networks:
      vane-stack:
        aliases:
          - vane
    volumes:
      - data:/home/vane/data
    extra_hosts:
      - "host.containers.internal:host-gateway"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    healthcheck:
      test:
        - CMD-SHELL
        - 'python3 -c "import socket, urllib.request; ip = socket.gethostbyname(socket.gethostname()); urllib.request.urlopen(f\"http://{ip}:3000\", timeout=5)"'
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  perplexica-mcp:
    build:
      context: /home/n4s5ti/Documents/dev/perplexica-mcp
    ports:
      - '3007:3001'
    networks:
      - vane-stack
    environment:
      - PERPLEXICA_BACKEND_URL=http://vane:3000/api/search
    depends_on:
      vane:
        condition: service_healthy
    restart: unless-stopped

  atl5s-mcp:
    build:
      context: /home/n4s5ti/Documents/dev/atl5s/apps/atl5s-mcp
      dockerfile: Containerfile
    networks:
      - vane-stack
    volumes:
      - /opt/WolframEngine:/opt/WolframEngine:ro
      - ${HOME}/.WolframEngine:/root/.WolframEngine:ro
    environment:
      - PERPLEXICA_BACKEND_URL=http://vane:3000/api/search
      - PERPLEXICA_PROVIDER_ID=7491ef43-4620-4669-a38f-e922e001d7d2
      - PERPLEXICA_CHAT_MODEL_NAME=gpt-4o-mini
      - PERPLEXICA_EMBEDDING_MODEL_NAME=text-embedding-3-small
      - PERPLEXICA_READ_TIMEOUT=60
    depends_on:
      vane:
        condition: service_healthy
    stdin_open: true
    restart: unless-stopped

volumes:
  data:
    name: 'vane-data'

networks:
  vane-stack:
    name: 'vane-stack'
